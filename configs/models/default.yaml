# Default model configurations for Memory-Eval
# Add your models here following the structure below.

gpt-4o:
  backend: openai
  model: gpt-4o
  api_key_env: OPENAI_API_KEY
  input_cost_per_m: 2.50
  output_cost_per_m: 10.00

gpt-4o-mini:
  backend: openai
  model: gpt-4o-mini
  api_key_env: OPENAI_API_KEY
  input_cost_per_m: 0.15
  output_cost_per_m: 0.60

gemini-2.0-flash:
  backend: openai
  model: gemini-2.0-flash
  base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  api_key_env: GOOGLE_API_KEY
  input_cost_per_m: 0.10
  output_cost_per_m: 0.40

azure-gpt-4.1:
  backend: azure
  model: gpt-4.1
  endpoint_env: AZURE_OPENAI_ENDPOINT
  api_key_env: AZURE_OPENAI_API_KEY
  api_version: 2024-08-01-preview

azure-gpt-4o:
  backend: azure
  model: gpt-4o
  endpoint_env: AZURE_OPENAI_ENDPOINT
  api_key_env: AZURE_OPENAI_API_KEY
  api_version: 2024-08-01-preview

claude-3-5-sonnet:
  backend: openai
  model: claude-3-5-sonnet-20241022
  base_url: https://api.anthropic.com/v1/
  api_key_env: ANTHROPIC_API_KEY
  input_cost_per_m: 3.00
  output_cost_per_m: 15.00

qwen2.5-1.5b:
  backend: openai
  model: qwen2.5-1.5b-instruct
  base_url: http://localhost:3333/v1
  # base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  input_cost_per_m: 0.00
  output_cost_per_m: 0.00

qwen3.5-122b-a10b:
  backend: openai
  model: qwen3.5-122b-a10b
  # base_url: http://localhost:8000/v1
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  input_cost_per_m: 0.80
  output_cost_per_m: 6.40
  extra_body:
    enable_thinking: false
    chat_template_kwargs:
      enable_thinking: false

qwen3.5-flash:
  backend: openai
  model: qwen3.5-flash
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  input_cost_per_m: 0.20
  output_cost_per_m: 2.00
  extra_body:
    enable_thinking: false
    chat_template_kwargs:
      enable_thinking: false